name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          brew install shellcheck
          # fail only on errors, not warnings/style nits
          shellcheck -S error tanlumen install.sh
      - name: syntax check
        run: |
          bash -n tanlumen
          bash -n install.sh
      - name: smoke (no BetterDisplay present, only argless paths)
        run: |
          # version banner should work without BetterDisplay
          sed 's/__VERSION__/ci/' tanlumen > /tmp/tanlumen
          chmod +x /tmp/tanlumen
          /tmp/tanlumen version
          /tmp/tanlumen --help | head -5

  commit-check:
    # validate conventional-commits format on new commits since latest tag.
    # the bump commit cog creates is itself a valid conventional commit (chore(version)),
    # so this also guards against accidentally landing non-conventional history on main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cocogitto/cocogitto-action@v3
        with:
          check-latest-tag-only: true
